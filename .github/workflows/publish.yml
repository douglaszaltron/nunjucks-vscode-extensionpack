name: Publish Extension (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (e.g., 0.3.0)'
        required: true
        type: string

jobs:
  publish:
    name: Build, Tag and Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Run tests
        run: npm run test
        continue-on-error: true

      - name: Update version in package.json
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Sync version to .vscode/launch.json
        run: node .changeset/update-versions.js

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit version changes
        run: |
          git add package.json .vscode/launch.json
          git commit -m "chore: bump version to ${{ github.event.inputs.version }}"

      - name: Create git tag
        run: git tag -a v${{ github.event.inputs.version }} -m "Release v${{ github.event.inputs.version }}"

      - name: Push changes and tag
        run: |
          git push origin master
          git push origin v${{ github.event.inputs.version }}

      - name: Install VSCE
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: "*.vsix"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to VS Code Extension Marketplace
        run: vsce publish --pat ${{ secrets.VSCE_TOKEN }}
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
